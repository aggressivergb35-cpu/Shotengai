<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

#shopPanel{
display:none;
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
border-radius:15px;
width:260px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
text-align:center;
}

button{
padding:8px 12px;
border:none;
background:#ff7a00;
color:white;
border-radius:8px;
}
</style>
</head>

<body>

<a-scene embedded arjs>

<!-- 店舗認識 -->
<a-marker type="pattern" url="https://raw.githubusercontent.com/aggressivergb35-cpu/Shotengai/main/pattern-IMG_6601.patt">

<a-image
src="https://cdn-icons-png.flaticon.com/512/545/545674.png"
position="0 0.8 0"
rotation="-90 0 0"
scale="1.5 1.5 1.5"
class="infoBtn">
</a-image>

</a-marker>


<!-- 常に表示クーポン -->
<a-image
src="https://cdn-icons-png.flaticon.com/512/992/992700.png"
position="1 -1 -3"
scale="1.5 1.5 1.5"
class="coupon">
</a-image>

<!-- 常に表示キャラクター -->
<a-image
src="https://i.imgur.com/8yKXslF.png"
position="-1 -1 -3"
scale="2 2 2">
</a-image>

<a-entity camera></a-entity>

</a-scene>
  
<!-- 店情報パネル -->
<div id="shopPanel">
<h2>ちとせや呉服店</h2>
<p>営業時間 10:00〜18:00</p>
<p>着物のお手入れやってます</p>
<button onclick="closePanel()">閉じる</button>
</div>

<script>

AFRAME.registerComponent('markerhandler', {
init: function () {

const marker = this.el
const infoBtn = marker.querySelector('.infoBtn')
const coupon = document.querySelector('.coupon')

infoBtn.addEventListener('click', function(){
document.getElementById("shopPanel").style.display="block"
})

coupon.addEventListener('click', function(){
alert("クーポンGET！")
})

}
})

document.querySelector('a-marker').setAttribute('markerhandler','')

function closePanel(){
document.getElementById("shopPanel").style.display="none"
}

</script>

</body>
</html>
